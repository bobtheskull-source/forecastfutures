name: Deploy Forecast Futures to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-forecastfutures
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package.json

      - name: Install dependencies
        run: npm install

      - name: Materialize Kalshi secret key
        env:
          KALSHI_API_KEY: ${{ secrets.KALSHI_API_KEY }}
          KALSHI_PRIVATE_KEY_B64: ${{ secrets.KALSHI_PRIVATE_KEY_B64 }}
        run: |
          mkdir -p secrets
          printf '%s' "$KALSHI_PRIVATE_KEY_B64" | base64 -d > secrets/kalshi_private_key.pem
          chmod 600 secrets/kalshi_private_key.pem
          printf 'KALSHI_API_KEY=%s\nKALSHI_PRIVATE_KEY_PATH=%s\n' "$KALSHI_API_KEY" './secrets/kalshi_private_key.pem' > .env

      - name: Build site
        run: npm run demo

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

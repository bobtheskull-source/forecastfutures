<head>

<title>Forecast Futures</title>
<style>
:root{color-scheme:dark;--bg:#08111f;--panel:#111a2e;--text:#eef2ff;--muted:#94a3b8;--accent:#60a5fa;--ok:#22c55e;--warn:#f59e0b}
*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:linear-gradient(180deg,#08111f,#050814);color:var(--text)}
.app{max-width:980px;margin:0 auto;padding:16px;padding-bottom:178px}.hero,.card,.nav{background:rgba(17,26,46,.92);border:1px solid rgba(96,165,250,.16);border-radius:18px}
    .hero{padding:18px;margin-bottom:14px}.grid{display:grid;gap:12px}.section{margin:14px 0}.section h2{margin:0 0 10px;font-size:1rem;color:#c7d2fe}
    .card{padding:14px}.row{display:flex;justify-content:space-between;gap:10px;align-items:center}.pill,.chip{display:inline-flex;padding:4px 8px;border-radius:999px;background:#172554;color:#bfdbfe;font-size:.72rem;text-transform:uppercase;letter-spacing:.04em;border:1px solid rgba(148,163,184,.14)}
    .chip{cursor:pointer}.muted{color:var(--muted);font-size:.88rem}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:12px}.stat{padding:12px;border-radius:14px;background:#0f172a;border:1px solid rgba(148,163,184,.15)}
    .nav{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(12px + env(safe-area-inset-bottom));width:min(980px,calc(100% - 24px));display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:8px;z-index:20;backdrop-filter:blur(10px)}
    .nav button{background:#0f172a;color:var(--text);border:1px solid rgba(148,163,184,.12);border-radius:14px;padding:12px 10px}.nav button.active{border-color:#60a5fa;box-shadow:0 0 0 1px rgba(96,165,250,.2) inset}
    .view[hidden]{display:none}.state{padding:12px;border-radius:12px;border:1px dashed rgba(148,163,184,.35)}.drivers{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
    .driver{background:#0b2447;border:1px solid rgba(148,163,184,.2);border-radius:999px;padding:4px 8px;font-size:.75rem;color:#bfdbfe}.chart{width:100%;height:72px}
    .actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}.btn{border:1px solid rgba(148,163,184,.22);border-radius:10px;padding:10px 12px;background:#0f172a;color:#e2e8f0;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center}
    .btn.primary{border-color:rgba(34,197,94,.45);background:#052e1f;color:#bbf7d0}.btn.warn{border-color:rgba(245,158,11,.5);background:#3a2404;color:#fde68a}
    .drawer{margin-top:10px;border:1px dashed rgba(148,163,184,.35);border-radius:12px;padding:10px;background:#0b1222}
    .drawer summary{cursor:pointer;color:#bfdbfe}
    .kv{display:grid;grid-template-columns:1fr auto;gap:8px;margin-top:8px}.kv span:last-child{color:#c7d2fe}
    .modal{position:fixed;inset:0;display:none;z-index:70;background:rgba(2,6,23,.78);padding:18px;align-items:flex-end}.modal.show{display:flex}
    .modal-card{width:100%;max-width:980px;margin:0 auto;background:#0f172a;border:1px solid rgba(148,163,184,.25);border-radius:16px;padding:14px;max-height:82vh;overflow:auto}
    .inputs{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}.inputs label{display:flex;flex-direction:column;gap:4px;font-size:.82rem;color:#cbd5e1}
    .inputs input,.inputs select{padding:10px;border-radius:10px;border:1px solid rgba(148,163,184,.3);background:#111827;color:#e5e7eb}
    .list-inline{display:flex;flex-wrap:wrap;gap:8px}.ok{color:#86efac}.warn{color:#fde68a}.seg{display:flex;gap:8px;flex-wrap:wrap}.seg .active{border-color:#60a5fa;box-shadow:0 0 0 1px rgba(96,165,250,.2) inset}.sticky-trade{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(92px + env(safe-area-inset-bottom));z-index:30;width:min(980px,calc(100% - 24px));display:flex;justify-content:center;pointer-events:none}.sticky-trade .btn{pointer-events:auto}.fresh-badge{display:inline-flex;align-items:center;gap:4px}.fresh-badge[data-freshness="fresh"]{background:#0f3b27;color:#bbf7d0}.fresh-badge[data-freshness="warm"]{background:#4a2c0a;color:#fde68a}.fresh-badge[data-freshness="stale"]{background:#3b0b0b;color:#fecaca}
    .skip-link{position:absolute;left:-9999px;top:10px;z-index:80;background:#0f172a;color:#eef2ff;padding:10px 12px;border:1px solid rgba(148,163,184,.3);border-radius:10px}.skip-link:focus{left:12px}
    button:focus-visible,a:focus-visible,input:focus-visible,select:focus-visible,summary:focus-visible{outline:2px solid #60a5fa;outline-offset:2px}
    .onboarding-banner{border-color:rgba(96,165,250,.24);background:linear-gradient(180deg,rgba(15,23,42,.95),rgba(7,12,24,.95))}.onboarding-steps{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
    @media (max-width:760px){.stats{grid-template-columns:repeat(2,1fr)}.nav{grid-template-columns:repeat(2,1fr)}.inputs{grid-template-columns:1fr}.modal{align-items:flex-start}.sticky-trade{bottom:calc(98px + env(safe-area-inset-bottom))}.app{padding-bottom:calc(206px + env(safe-area-inset-bottom))}}

<main class="app" id="mainContent">
  <section class="hero">
    <div class="row"><div><div class="pill">Kalshi market radar</div><h1>Forecast Futures</h1></div><div class="pill">mobile-ready</div></div>
    <p class="muted">Flag big market moves, rank by edge and tradeability, inspect forecast confidence, and jump into trades fast.</p>
    <p class="muted">Snapshot: using bundled sample markets</p>
    <div class="stats">
      <div class="stat"><strong>5</strong><div class="muted">markets loaded</div></div>
      <div class="stat"><strong>3</strong><div class="muted">ranked opportunities</div></div>
      <div class="stat"><strong>1</strong><div class="muted">execution-gated</div></div>
      <div class="stat"><strong>107.07ms</strong><div class="muted">signal p95 latency</div></div>
    </div>
  </section>

  <section class="view section" data-view="list">
    <h2>Opportunity score list</h2>
    <div class="card">
      <div class="row" style="flex-wrap:wrap;gap:8px">
        <input id="marketSearch" aria-label="Search markets" placeholder="Search markets/events" style="flex:1;min-width:220px;padding:10px;border-radius:12px;border:1px solid rgba(148,163,184,.2);background:#0f172a;color:#eef2ff" />
        <button class="chip" data-sort="score">Sort: score</button>
        <button class="chip" data-sort="recency">Sort: recency</button>
        <button class="chip" data-sort="mostClicked">Sort: most clicked</button>
        <button class="chip" id="watchlistBtn">Watchlist only: off</button>
        <button class="chip" id="saveWatchlistBtn">Save watchlist</button>
        <button class="chip" id="restoreWatchlistBtn">Restore watchlist</button>
        <button class="chip" id="alertControlsBtn">Alert controls</button>
        <button class="chip" id="refreshSnapshotBtn">Refresh snapshot</button>
      </div>
      <div class="seg" style="margin-top:8px">
        <button class="chip active" id="feedNowBtn">Feed: Now</button>
        <button class="chip" id="feedDiscoverBtn">Feed: Discover</button>
        <button class="chip" id="presetHighEdgeBtn">Preset: edge > 5%</button>
        <button class="chip" id="presetBreakoutBtn">Preset: breakout</button>
        <button class="chip" id="presetWatchlistBtn">Preset: watchlist</button>
        <button class="chip" id="savePresetBtn">Save preset</button>
        <button class="chip" id="restorePresetBtn">Restore preset</button>
        <button class="chip" id="presetExpiringBtn">Preset: resolves < 7d</button>
        <button class="chip" id="resetPresetBtn">Preset: clear</button>
        <button class="chip" id="exportCsvBtn">Export CSV</button>
      </div>
      <p class="muted" id="alertsSummary" style="margin-top:8px"></p>
    </div>
    <div class="card" style="margin-top:12px"><strong>Alert history</strong><p class="muted">Recently surfaced alerts, dismissals, and archives are stored locally and do not change ranking.</p><div id="alertHistoryPanel" class="grid" style="margin-top:8px"></div></div>
    <div class="drawer" style="margin-top:12px"><strong>Settings guide</strong><p class="muted">Use the API host for auth and market reads. Keep the Pages client read-only, and use the refresh snapshot button when you want the current rendered state to reload.</p></div>
    <div id="onboardingBanner" class="card onboarding-banner" hidden>
      <div class="row"><strong>Quick start</strong><button class="btn" id="dismissOnboardingBtn">Dismiss</button></div>
      <p class="muted">Use the list to scan opportunities, open detail for compare and history, then trade when the pre-trade check is green.</p>
      <div class="onboarding-steps">
        <span class="pill">1. Search or sort the list</span>
        <span class="pill">2. Open detail for compare</span>
        <span class="pill">3. Pre-trade check then open Kalshi</span>
      </div>
    </div>
    <div class="card" style="margin-top:12px"><div class="row"><strong>Morning brief</strong><div class="actions" style="margin-top:0"><button class="btn" id="exportBriefCsvBtn">Export CSV</button><button class="btn" id="shareBriefSummaryBtn">Share summary</button></div></div><div id="morningBrief" class="grid" style="margin-top:8px"></div></div>
    <div class="card" style="margin-top:12px"><strong>Calibration snapshot</strong><p id="calibrationSnapshot" class="muted" style="margin-top:8px"></p></div>
    <div class="card" style="margin-top:12px">
      <div class="row"><strong>Backend readiness</strong><span class="pill">needs secrets</span></div>
      <p class="muted">Missing: KALSHI_API_KEY, private key file</p>
      <p class="muted">Client mode: read-only GitHub Pages UI. Auth stays on the server.</p>
      <p id="snapshotRefreshMeta" class="muted">Last refresh: never</p>
      <div class="actions"><button class="btn" id="refreshSnapshotBtn">Refresh snapshot</button></div>
      <details class="drawer">
        <summary>API host vs GitHub Pages</summary>
        <p class="muted">The Pages client only renders market data and trade links. Credentials stay on the API host or local server, never in the browser.</p>
        <ul class="muted"><li>Environment: KALSHI_BASE_URL</li><li>Auth secret: KALSHI_API_KEY</li><li>Private key path: KALSHI_PRIVATE_KEY_PATH</li><li>Keep Kalshi auth on the server side only.</li><li>Rotate any exposed key before production use.</li><li>Expose read-only market data to the mobile client.</li><li>Use simple retry handling and rate limits on the server edge.</li><li>Document the mobile/frontend Pages target separately from the API host.</li></ul>
      </details>
    </div>
    <div id="listState" class="state" hidden></div>
    <div id="listResults" class="grid" style="margin-top:10px"></div>
    <div class="card" style="margin-top:12px"><strong>Most clicked (time-decay)</strong><div id="mostClicked" class="grid" style="margin-top:8px"></div></div>
    <div class="card" style="margin-top:12px"><strong>Most executed (24h trades)</strong><div id="mostExecuted" class="grid" style="margin-top:8px"></div></div>
    <div class="card" style="margin-top:12px"><strong>Rising interest (velocity)</strong><div id="risingInterest" class="grid" style="margin-top:8px"></div></div>
    <div class="card" style="margin-top:12px"><strong>Funnel analytics</strong><p id="funnelStats" class="muted" style="margin-top:8px"></p></div>
  </section>

  <section class="view section" data-view="detail" hidden>
    <h2>Forecast detail</h2>
    <div id="detailState" class="state" hidden></div>
    <div id="detailPanel" class="card"></div>
  </section>

  <section class="view section" data-view="trends" hidden>
    <h2>Trend & execution guardrails</h2>
    <div class="grid">
      <article class="card"><strong>Latency metrics</strong><p class="muted">p50: 76.68ms · p95: 107.07ms</p></article>
      <article class="card"><strong>Quality gate</strong><p class="muted">Depth ≥ 250, Volume ≥ 200, Spread ≤ 0.06, Freshness ≤ 900s</p></article>
      <article class="card"><strong>Watchlist health</strong><p id="watchlistHealth" class="muted" style="margin-top:8px"></p></article>
      <article class="card"><strong>Gate reason counts</strong><p class="muted">low depth: 1 · low volume: 0 · wide spread: 1 · stale: 0</p></article>
    </div>
    <div class="card" style="margin-top:12px"><strong>Move rules</strong><ul class="muted"><li>breakout candidate: move >= 12, volume >= 400, score floor 22</li><li>liquid mover: move >= 8, volume >= 700, score floor 18</li><li>watchlist drift: move >= 5, volume >= 1000, score floor 15</li></ul></div>
    <div class="card" style="margin-top:12px"><strong>Edge cases</strong><ul class="muted"><li>Tiny move plus huge volume can still be filtered out if the score stays below the floor.</li><li>Big move on thin volume is flagged, but the label should note lower confidence.</li><li>Zero or missing volume should never crash the detector, it should just score conservatively.</li></ul></div>
  </section>

  <section class="view section" data-view="archive" hidden>
    <h2>Archive</h2>
    <div class="card">
      <div class="row"><strong>Review summary</strong><span class="pill">3 wins · 0 misses</span></div>
      <p class="muted">Top win: CPI surprise next print · Top miss: n/a</p>
      <div class="actions">
        <button class="btn" id="exportReviewCsvBtn">Export review CSV</button>
        <button class="btn" id="shareReviewSummaryBtn">Share review</button>
      </div>
    </div>
    <div class="card" style="margin-top:12px">
      <strong>Forecast theses</strong>
      <div class="grid" style="margin-top:8px"><article class="card"><div class="row"><strong>1. CPI surprise next print</strong><span class="pill">score 79.48</span></div><p class="muted">BLS CPI release · up</p><p class="muted">Thesis: Large up move with market/model edge 28.33% and medium confidence.</p><p class="muted">Post-mortem prompt: Fill this in after the event resolves to compare the forecast with the outcome.</p></article><article class="card"><div class="row"><strong>2. Fed cuts at next meeting</strong><span class="pill">score 71.35</span></div><p class="muted">FOMC decision · down</p><p class="muted">Thesis: Large down move with market/model edge -18.00% and high confidence.</p><p class="muted">Post-mortem prompt: Fill this in after the event resolves to compare the forecast with the outcome.</p></article><article class="card"><div class="row"><strong>3. Major storm makes landfall</strong><span class="pill">score 64.56</span></div><p class="muted">Weather event · up</p><p class="muted">Thesis: Large up move with market/model edge 30.00% and medium confidence.</p><p class="muted">Post-mortem prompt: Fill this in after the event resolves to compare the forecast with the outcome.</p></article>

    </div>
    <div class="card" style="margin-top:12px">
      <strong>Resolved archive</strong>
      <div class="grid" style="margin-top:8px"><article class="card"><div class="row"><strong>CPI surprise next print</strong><span class="pill">correct</span></div><p>Real world confirmed the move</p><p class="muted">Forecast direction: up · Outcome: up</p><p class="muted">Score 79.48 · accuracy correct</p></article><article class="card"><div class="row"><strong>Fed cuts at next meeting</strong><span class="pill">correct</span></div><p>Signal overshot and reversed</p><p class="muted">Forecast direction: down · Outcome: down</p><p class="muted">Score 71.35 · accuracy correct</p></article><article class="card"><div class="row"><strong>Major storm makes landfall</strong><span class="pill">correct</span></div><p>Event pressure kept building</p><p class="muted">Forecast direction: up · Outcome: up</p><p class="muted">Score 64.56 · accuracy correct</p></article></div>
    </div>
    <div class="card" style="margin-top:12px"><p class="muted">Correct: 3 · Missed: 0</p></div>
  </section>
</main>

<div class="modal" id="preTradeModal" aria-hidden="true" role="dialog" aria-modal="true">
  <div class="modal-card" id="preTradeBody"></div>
</div>

<div class="modal" id="alertModal" aria-hidden="true" role="dialog" aria-modal="true">
  <div class="modal-card">
    <div class="row"><strong>Personalized alert controls</strong><button class="btn" data-close="alertModal">Close</button></div>
    <div class="inputs" style="margin-top:10px">
      <label>Edge threshold %<input id="prefMinEdge" type="number" min="0" max="50" step="0.5" /></label>
      <label>Confidence floor
        <select id="prefConfidence">
          <option value="low">Low</option>
          <option value="medium">Medium</option>
          <option value="high">High</option>
        </select>
      </label>
      <label>Quiet hours start (0-23)<input id="prefQuietStart" type="number" min="0" max="23" step="1" /></label>
      <label>Quiet hours end (0-23)<input id="prefQuietEnd" type="number" min="0" max="23" step="1" /></label>
      <label>Cooldown minutes<input id="prefCooldown" type="number" min="5" max="720" step="5" /></label>
    </div>
    <div class="actions">
      <button class="btn primary" id="saveAlertPrefs">Save controls</button>
      <button class="btn" id="resetAlertPrefs">Reset defaults</button>
    </div>
  </div>
</div>

<div class="modal" id="paywallModal" aria-hidden="true" role="dialog" aria-modal="true">
  <div class="modal-card" id="paywallBody"></div>
</div>

<div class="sticky-trade"><a id="stickyTradeCta" class="btn primary" href="#" target="_blank" rel="noopener" data-action="trade">Trade selected on Kalshi</a></div>

</nav>

  function risingInterestScore(marketId){
    var payload = loadTelemetry();
    var now = Date.now();
    var entries = payload[marketId] || [];
    var recent = entries.filter(function(e){ return (now - e.ts) <= 30 * 60 * 1000; });
    var prior = entries.filter(function(e){ return (now - e.ts) > 30 * 60 * 1000 && (now - e.ts) <= 2 * 60 * 60 * 1000; });
    var uniqRecent = new Set(recent.map(function(e){ return e.visitor; })).size;
    var velocity = recent.length * 2 + uniqRecent * 1.5;
    var baseline = Math.max(1, prior.length / 3);
    return velocity / baseline;
  }

  function compliantCopy(text){

      .replace(/guaranteed/gi,'')
      .replace(/risk[- ]?free/gi,'')

      .replace(/sure thing/gi,'')

  function computeIntent(item){
    var rank = Math.min(1, Number(item && item.rankScore || 0) / 100);
    var edgeLift = Math.min(1, Math.abs(Number(item && item.edge || 0)) / 0.12);
    var rising = Math.min(1, Number(risingInterestScore(item && item.id)) / 3.5);
    var clickLift = Math.min(1, Number(decayScore(item && item.id)) / 3);
    var clicks = Math.min(1, Number(state.tradeClicks || 0) / 4);
    var score = (clicks * 0.25) + (rank * 0.25) + (edgeLift * 0.2) + (rising * 0.15) + (clickLift * 0.15);
    var tier = score >= 0.75 ? 'hot' : score >= 0.5 ? 'warm' : 'cold';
    return { score: Number(score.toFixed(4)), tier: tier };
  }

  function sparkline(points){
    if(!points || !points.length){ return '<div class="muted">No probability history.</div>'; }
    var min = Math.min.apply(null, points);
    var max = Math.max.apply(null, points);
    var span = Math.max(0.0001, max-min);
    var coords = points.map(function(p,i){
      var x = (i / ((points.length - 1) || 1)) * 100;
      var y = 100 - (((p-min)/span) * 100);
      return x.toFixed(2) + ',' + y.toFixed(2);
    }).join(' ');
    return '<svg class="chart" viewBox="0 0 100 100" preserveAspectRatio="none"><polyline fill="none" stroke="#60a5fa" stroke-width="2" points="'+coords+'" /></svg>';
  }

  function downloadTextFile(filename, content, mimeType){
    var blob = new Blob([String(content || '')], { type: mimeType || 'text/plain;charset=utf-8' });
    var url = URL.createObjectURL(blob);
    var anchor = document.createElement('a');
    anchor.href = url;
    anchor.download = filename;
    document.body.appendChild(anchor);
    anchor.click();
    anchor.remove();
    setTimeout(function(){ URL.revokeObjectURL(url); }, 0);
  }

    if(state.watchlistOnly) {
      var watch = loadWatchlist();
      filtered = filtered.filter(function(item){ return watch.includes(String(item.id)); });

      filtered = filtered.filter(function(item){ return Math.abs(Number(item.edge || 0)) * 100 >= state.minEdgePreset; });
    }

    if(state.maxResolveHours != null) {
      filtered = filtered.filter(function(item){ return Number(item.hoursToResolve || 48) <= state.maxResolveHours; });

    }

    if(state.executionReadyOnly) {

    var sorted = sortSignals(filtered);

    if(!data.length){ listState.hidden=false; listState.textContent='Loading opportunities...'; listResults.innerHTML=''; return; }
    if(!sorted.length){ listState.hidden=false; listState.textContent='No results match this search/filter.'; listResults.innerHTML=''; return; }

  function openModal(modal, trigger){
    if(!modal) return;
    activeModalTrigger = trigger || document.activeElement || null;
    modal.classList.add('show');
    modal.setAttribute('aria-hidden','false');
    var focusTarget = modal.querySelector('[data-close], .btn, button, a, input, select, textarea');
    setTimeout(function(){ if(focusTarget && focusTarget.focus) focusTarget.focus(); }, 0);
  }

  function closeModal(id){
    var modal = document.getElementById(id);
    if(!modal) return;
    modal.classList.remove('show');
    modal.setAttribute('aria-hidden','true');
    if(activeModalTrigger && activeModalTrigger.focus){
      setTimeout(function(){ try { activeModalTrigger.focus(); } catch {} }, 0);
    }
    activeModalTrigger = null;
  }

  function currentOpenModal(){
    return [preTradeModal, alertModal, paywallModal].find(function(modal){ return modal && modal.classList.contains('show'); }) || null;
  }

  function trapModalTabKey(event){
    var modal = currentOpenModal();
    if(!modal || event.key !== 'Tab') return;
    var nodes = Array.from(modal.querySelectorAll('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])')).filter(function(node){ return !node.hasAttribute('disabled'); });
    if(!nodes.length) return;
    var first = nodes[0];
    var last = nodes[nodes.length - 1];
    if(event.shiftKey && document.activeElement === first){
      event.preventDefault();
      last.focus();
    } else if(!event.shiftKey && document.activeElement === last){
      event.preventDefault();
      first.focus();
    }
  }

  window.addEventListener('keydown', function(event){
    if(event.key === 'Escape'){
      if(paywallModal.classList.contains('show')){ closeModal('paywallModal'); return; }
      if(alertModal.classList.contains('show')){ closeModal('alertModal'); return; }
      if(preTradeModal.classList.contains('show')){ closeModal('preTradeModal'); return; }

    trapModalTabKey(event);
  });

      confidenceFloor: document.getElementById('prefConfidence').value || defaultPrefs.confidenceFloor,
      quietHoursStart: Number(document.getElementById('prefQuietStart').value || defaultPrefs.quietHoursStart),
      quietHoursEnd: Number(document.getElementById('prefQuietEnd').value || defaultPrefs.quietHoursEnd),
      cooldownMinutes: Number(document.getElementById('prefCooldown').value || defaultPrefs.cooldownMinutes),
    };
    saveAlertPrefs(prefs);
    closeModal('alertModal');
    renderList();
  });
  document.getElementById('resetAlertPrefs').addEventListener('click', function(){
    saveAlertPrefs(defaultPrefs);
    closeModal('alertModal');
    renderList();
  });

  document.body.addEventListener('click', function(e){
    var closeEl = e.target.closest('[data-close]');
    if(closeEl){ closeModal(closeEl.getAttribute('data-close')); return; }

    var target = e.target.closest('[data-action]');
    if(!target) return;
    var action = target.getAttribute('data-action');
    var id = target.getAttribute('data-id');
    var item = data.find(function(x){ return x.id === id; });

    if(action==='view'){ state.selectedId = id; show('detail'); renderDetail(); }
    if(action==='watch' && item){ toggleWatchlist(id); renderList(); }
    if(action==='pretrade' && item){ recordFunnel('pretrade', id); openPreTradeSheet(item); renderFunnel(); }
    if(action==='dismiss-alert' && item){ updateAlertHistoryStatus(id, 'dismissed'); renderAlertHistory(); renderList(); }
    if(action==='archive-alert' && item){ updateAlertHistoryStatus(id, 'archived'); renderAlertHistory(); renderList(); }
    if(action==='trade'){
      recordClick(id);
      recordFunnel('trade', id);
      renderMostClicked();
      renderMostExecuted();
      renderRisingInterest();
      renderFunnel();
      if(item && shouldShowPaywall(item)) {
        recordFunnel('paywall', id);
        localStorage.setItem(paywallSeenKey, String(Date.now()));
        openPaywall(item);
      }
    }
    if(action==='share' && item){
      var payload = buildShareText(item);
      Promise.resolve(copyShareText(payload)).then(function(done){
        if(!done && navigator.clipboard && navigator.clipboard.writeText){ return navigator.clipboard.writeText(payload); }
        if(!done){ window.prompt('Copy trade link', payload); }
      });
    }
    if(action==='share-summary'){
      var summaryItem = item || data.find(function(x){ return x.id === state.selectedId; }) || data[0] || null;
      var summaryPayload = buildSummaryShareText({ briefItems: morningBriefData, selectedItem: summaryItem, compare: compareMarketToMedian(data, state.selectedId) });
      Promise.resolve(copyShareText(summaryPayload)).then(function(done){
        if(!done && navigator.clipboard && navigator.clipboard.writeText){ return navigator.clipboard.writeText(summaryPayload); }
        if(!done){ window.prompt('Copy summary', summaryPayload); }
      });
    }

    if(action==='startTrial'){
      recordFunnel('trial', id);
      renderFunnel();
      paywallBody.innerHTML = '<div class="row"><strong>Trial activated</strong><button class="btn" data-close="paywallModal">Close</button></div>'
        + '<p class="muted">Your onboarding is complete. Alerts + pro opportunity panel unlocked for 7 days.</p>'
        + '<p class="muted">Forecasts are probabilistic and not financial advice. Trade responsibly.</p>';
    }
  });

  state.tradeClicks = totalTradeClicks();
  refreshSnapshotMetaText();
  Object.assign(state, readListStateFromUrl());
  renderList();
  renderMorningBrief();
  renderCalibrationSnapshot();
  renderWatchlistHealth();
  renderAlertHistory();
  renderMostClicked();
  renderMostExecuted();
  renderRisingInterest();
  renderDetail();
  renderFunnel();
  var tab = location.hash.replace('#','');
  show(['list','detail','trends','archive'].includes(tab) ? tab : 'list');
})();
</script>
</body>
</html>
